services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: uzmarket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=uzmarket;Username=postgres;Password=postgres"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: UzMarket
      Jwt__Audience: UzMarket
      Jwt__AccessTokenExpiryMinutes: "1440"
      BotSecret: "${BOT_SECRET}"
      BotBaseUrl: "http://bot:8080"
      MediaBaseUrl: "http://10.100.104.114:3000/media"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      Cors__AllowedOrigins__1: "http://localhost:3001"
      Cors__AllowedOrigins__2: "http://10.100.104.114:3000"
      Cors__AllowedOrigins__3: "http://10.100.104.114:3001"
    volumes:
      - wwwroot_data:/app/wwwroot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: src/bot
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      API_BASE_URL: "http://api:5000/api"
      BOT_SECRET: "${BOT_SECRET}"
      REDIS_URL: "redis://redis:6379"
      WEBAPP_HOST: "0.0.0.0"
      WEBAPP_PORT: "8080"
      WEBAPP_URL: "http://10.100.104.114:3000"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: src/web
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:5000
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_TENANT_SLUG: default
        NEXT_PUBLIC_MEDIA_URL: /media
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "/api/v1"
      NEXT_PUBLIC_TENANT_SLUG: "default"
      NEXT_PUBLIC_MEDIA_URL: "/media"
      API_INTERNAL_URL: "http://api:5000"
    depends_on:
      - api

volumes:
  postgres_data:
  wwwroot_data:
